<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRAJ ELEMENTARY · Corrected Print Voucher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: #eef2f6; padding: 20px; }
        .dashboard { max-width: 1440px; margin: 0 auto; }
        /* navigation */
        .navbar {
            background: white; border-radius: 40px; padding: 10px 25px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 30px; flex-wrap: wrap;
            box-shadow: 0 6px 14px rgba(0,20,40,0.08); border: 1px solid #d9e3ed;
        }
        .nav-logo .brand { font-weight: 800; font-size: 1.4rem; color: #0b2b40; background: #e2f0fd; padding: 8px 18px; border-radius: 40px; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-item { padding: 10px 20px; border-radius: 30px; font-weight: 600; background: transparent; border: none; display: flex; align-items: center; gap: 8px; color: #1e3b4c; cursor: default; }
        .nav-item.active { background: #0b2b40; color: white; }
        .nav-right { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .nav-clock { background: #0b2b40; color: white; padding: 8px 20px; border-radius: 40px; }
        /* header */
        .school-header {
            background: linear-gradient(135deg, #0b2b40 0%, #1a4b60 100%);
            color: white; border-radius: 30px; padding: 20px 30px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        /* quick bar */
        .quick-bar {
            background: white; border-radius: 50px; padding: 10px 20px; display: flex;
            align-items: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;
            border: 1px solid #d2e0ed;
        }
        .quick-gr-wrap {
            display: flex; background: #f0f7ff; border-radius: 60px; padding: 4px 4px 4px 20px;
            border: 1px solid #b7d0e5; flex: 1 1 300px;
        }
        .quick-gr-wrap input { flex: 1; border: none; background: transparent; padding: 12px 5px; font-size: 1rem; font-weight: 500; }
        .quick-gr-wrap input:focus { outline: none; }
        .quick-gr-wrap button { background: #0b2b40; color: white; border: none; padding: 10px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .print-big { background: #0b2b40; color: white; padding: 12px 32px; border-radius: 40px; font-weight: 700; border: none; display: flex; align-items: center; gap: 8px; margin-left: auto; cursor: pointer; }
        /* cards */
        .card { background: white; border-radius: 28px; padding: 25px 30px; box-shadow: 0 10px 22px rgba(0,0,0,0.04); margin-bottom: 25px; border: 1px solid #e0ecf5; }
        .fee-panel { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 25px; }
        .section-title { font-size: 0.8rem; font-weight: 800; color: #0b2b40; text-transform: uppercase; border-left: 5px solid #0b2b40; padding-left: 15px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; color: #2b4d6a; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1.5px solid #d8e3ef; border-radius: 18px; }
        .fee-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .total-section { background: #e5f2fa; border-radius: 24px; padding: 20px; margin-top: 20px; }
        .total-display { font-size: 2.2rem; font-weight: 800; color: #1a7f4c; text-align: center; width: 100%; border: none; background: transparent; }
        .cash-paid { border: 2px solid #0f8540 !important; border-radius: 20px !important; font-size: 1.4rem !important; padding: 15px !important; margin-top: 10px; }
        /* month colors */
        .month-jan { background: #c5e0ff; color: #0047ab; } .month-feb { background: #ffd7b3; color: #b45f06; }
        .month-mar { background: #c1ffc1; color: #0a6b0a; } .month-apr { background: #ffffb0; color: #8b8000; }
        .month-may { background: #ffb3b3; color: #a52a2a; } .month-jun { background: #d5a6ff; color: #4b0082; }
        .month-jul { background: #a6e3ff; color: #005f73; } .month-aug { background: #ffd966; color: #b45309; }
        .month-sep { background: #b7e1cd; color: #1e5b3e; } .month-oct { background: #f4cccc; color: #9d2b2b; }
        .month-nov { background: #e0d3ff; color: #5e4b8b; } .month-dec { background: #d9d9d9; color: #2c3e50; }
        .month-badge { padding: 4px 12px; border-radius: 40px; font-weight: 600; display: inline-block; }
        /* buttons */
        .btn-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 25px; padding-top: 20px; border-top: 2px dashed #c7d9e8; }
        .btn { padding: 12px 28px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1.5px solid #c5d5e8; }
        .btn-primary { background: #0b2b40; color: white; border: none; }
        .btn-success { background: #1e6f4c; color: white; border: none; }
        .btn-danger { background: #b33939; color: white; }
        .btn-info { background: #2277aa; color: white; }
        /* table */
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { background: #eaf1fa; padding: 15px 8px; font-size: 0.7rem; color: #0b2b40; border-bottom: 2px solid #9bb7d4; }
        .history-table td { padding: 14px 8px; border-bottom: 1px solid #dde6f0; font-size: 0.85rem; }
        .month-separator { background: #dceafa; font-weight: 800; }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btns button, .action-btns select { padding: 6px 12px; border-radius: 30px; border: none; font-weight: 600; font-size: 0.7rem; background: #ecf3fa; cursor: pointer; }
        .print2-btn { background: #0b2b40; color: white; }
        .edit-btn { background: #fff2d9; color: #a9660e; }
        .delete-btn { background: #ffe2e2; color: #b33939; }
        #printFrame { display: none; }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- navbar -->
    <div class="navbar">
        <div class="nav-logo"><span class="brand">🏫 SIRAJ</span></div>
        <div class="nav-links">
            <span class="nav-item active">📊 Dashboard</span>
            <span class="nav-item">👥 Students</span>
            <span class="nav-item">💰 Fees</span>
            <span class="nav-item">📈 Reports</span>
        </div>
        <div class="nav-right"><span class="nav-clock" id="liveClockNav"></span></div>
    </div>
    <!-- header -->
    <div class="school-header">
        <div><h1>SIRAJ ELEMENTARY PUBLIC SCHOOL</h1><div>Rohri, Sindh · Est. 1998</div></div>
        <div style="background:rgba(255,255,255,0.15); border-radius:50px; padding:12px 25px;">📅 Academic Year 2025-26</div>
    </div>
    <!-- quick GR bar -->
    <div class="quick-bar">
        <div style="font-weight:700; color:#0b2b40;">🔍 GR No:</div>
        <div class="quick-gr-wrap">
            <input type="text" id="quickGR" placeholder="Enter GR and press Enter" onkeypress="if(event.key==='Enter') quickLoadStudent()">
            <button onclick="quickLoadStudent()">LOAD</button>
        </div>
        <button class="print-big" onclick="printCurrentVoucher()">🖨️ PRINT VOUCHER</button>
    </div>

    <!-- main card -->
    <div class="card">
        <div class="fee-panel">
            <!-- student info -->
            <div>
                <div class="section-title">📋 STUDENT DETAILS</div>
                <div class="input-group"><label>GR number</label><input type="text" id="gr" onblur="fetchStudent()" placeholder="Enter GR"></div>
                <div class="input-group"><label>Student name</label><input type="text" id="name" readonly></div>
                <div class="input-group"><label>Father name</label><input type="text" id="fname" readonly></div>
                <div class="input-group"><label>Class</label><input type="text" id="class" readonly></div>
            </div>
            <!-- fee components -->
            <div>
                <div class="section-title">💰 FEE COMPONENTS</div>
                <div class="fee-grid">
                    <div class="input-group"><label>Monthly</label><input type="number" id="monthly" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Tuition</label><input type="number" id="tuition" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Admission</label><input type="number" id="admission" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Exam</label><input type="number" id="exam" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Other dues</label><input type="number" id="other" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Late fine</label><input type="number" id="lateFine" oninput="calcTotal()"></div>
                    <div class="input-group"><label>Arrears</label><input type="number" id="arrears" oninput="calcTotal()"></div>
                </div>
            </div>
            <!-- payment -->
            <div>
                <div class="section-title">📅 PAYMENT</div>
                <div class="input-group"><label>Month</label>
                    <select id="monthSel" onchange="applyMonthColor()">
                        <option value="January" class="month-jan">January</option><option value="February" class="month-feb">February</option>
                        <option value="March" class="month-mar">March</option><option value="April" class="month-apr">April</option>
                        <option value="May" class="month-may">May</option><option value="June" class="month-jun">June</option>
                        <option value="July" class="month-jul">July</option><option value="August" class="month-aug">August</option>
                        <option value="September" class="month-sep">September</option><option value="October" class="month-oct">October</option>
                        <option value="November" class="month-nov">November</option><option value="December" class="month-dec">December</option>
                    </select>
                </div>
                <div class="input-group"><label>Due date (manual)</label><input type="text" id="dueDate" placeholder="e.g., 25-03-2025"></div>
                <div class="total-section">
                    <label>TOTAL PAYABLE</label>
                    <input type="text" id="totalPayable" class="total-display" readonly value="0">
                    <input type="number" id="cashPaid" class="cash-paid" placeholder="Cash paid" oninput="calcTotal()">
                </div>
            </div>
        </div>
        <!-- action buttons (fully wired) -->
        <div class="btn-row">
            <button class="btn btn-success" onclick="saveOnly()">💾 SAVE ONLY</button>
            <button class="btn btn-primary" onclick="printCurrentVoucher()">🖨️ PRINT VOUCHER</button>
            <button class="btn btn-info" onclick="saveAndPrintVoucher()">💾➕🖨️ SAVE & PRINT</button>
            <button class="btn" onclick="exportMonthlyReport()">📊 MONTHLY REPORT</button>
            <button class="btn" onclick="document.getElementById('fileImport').click()">📂 IMPORT EXCEL</button>
            <input type="file" id="fileImport" style="display:none" onchange="importDatabase(event)">
            <button class="btn btn-danger" onclick="clearForm()">🔄 CLEAR</button>
        </div>
    </div>

    <!-- history table -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span class="section-title" style="margin:0;">📋 RECENT VOUCHERS</span>
            <span style="background:#0b2b40; color:white; border-radius:30px; padding:6px 20px;">Total: <span id="totalRecords">0</span></span>
        </div>
        <table class="history-table">
            <thead><tr><th>GR</th><th>Student</th><th>Father</th><th>Month</th><th>Due date</th><th>Total</th><th>Paid</th><th>Due</th><th>Actions</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>
<iframe id="printFrame"></iframe>

<script>
    (function() {
        // ----- DATA STORES (persistent) -----
        let studentDB = JSON.parse(localStorage.getItem('siraj_studentDB')) || [];
        let transactions = JSON.parse(localStorage.getItem('siraj_transactions')) || [];

        // fallback demo data
        if (studentDB.length === 0) {
            studentDB = [
                { gr: '1001', name: 'Ahmed Raza', fname: 'Mohammad Raza', class: '5-A', arrears: 0 },
                { gr: '1002', name: 'Fatima Bibi', fname: 'Rashid Ahmed', class: '4-B', arrears: 500 },
                { gr: '1003', name: 'Hassan Ali', fname: 'Javed Ali', class: '8-C', arrears: 200 },
            ];
            localStorage.setItem('siraj_studentDB', JSON.stringify(studentDB));
        }
        window.studentDB = studentDB;
        window.transactions = transactions;

        // month mappings
        window.monthColors = {
            'January': 'month-jan', 'February': 'month-feb', 'March': 'month-mar',
            'April': 'month-apr', 'May': 'month-may', 'June': 'month-jun',
            'July': 'month-jul', 'August': 'month-aug', 'September': 'month-sep',
            'October': 'month-oct', 'November': 'month-nov', 'December': 'month-dec'
        };
        window.monthOrder = {
            'January':1, 'February':2, 'March':3, 'April':4, 'May':5, 'June':6,
            'July':7, 'August':8, 'September':9, 'October':10, 'November':11, 'December':12
        };

        window.applyMonthColor = function() {
            const sel = document.getElementById('monthSel');
            sel.className = monthColors[sel.value] || '';
        };

        window.calcTotal = function() {
            const ids = ['monthly','tuition','admission','exam','other','lateFine','arrears'];
            let total = 0;
            ids.forEach(id => total += parseFloat(document.getElementById(id).value) || 0);
            document.getElementById('totalPayable').value = total;
        };

        window.fetchStudent = function() {
            const gr = document.getElementById('gr').value.trim();
            const student = studentDB.find(s => String(s.gr) === String(gr));
            if (!student) return;
            document.getElementById('name').value = student.name || '';
            document.getElementById('fname').value = student.fname || '';
            document.getElementById('class').value = student.class || '';
            document.getElementById('arrears').value = student.arrears || 0;
            const last = [...transactions].filter(t => String(t.gr) === String(gr)).sort((a,b) => b.id - a.id)[0];
            if (last && last.dueFee > 0) {
                document.getElementById('arrears').value = last.dueFee;
            }
            calcTotal();
        };

        window.quickLoadStudent = function() {
            const gr = document.getElementById('quickGR').value.trim();
            if (!gr) return;
            const student = studentDB.find(s => String(s.gr) === String(gr));
            if (!student) {
                alert('Student not found. Try 1001, 1002, 1003');
                return;
            }
            document.getElementById('gr').value = student.gr;
            document.getElementById('name').value = student.name;
            document.getElementById('fname').value = student.fname;
            document.getElementById('class').value = student.class;

            const last = transactions.filter(t => String(t.gr) === String(gr)).sort((a,b) => b.id - a.id)[0];
            if (last) {
                document.getElementById('arrears').value = (last.dueFee > 0 ? last.dueFee : (student.arrears || 0));
                document.getElementById('monthly').value = last.monthly || '';
                document.getElementById('tuition').value = last.tuition || '';
                document.getElementById('admission').value = last.admission || '';
                document.getElementById('exam').value = last.exam || '';
                document.getElementById('other').value = last.other || '';
                document.getElementById('lateFine').value = last.lateFine || '';
                document.getElementById('monthSel').value = last.month;
                document.getElementById('dueDate').value = last.dueDate || '';
            } else {
                document.getElementById('arrears').value = student.arrears || 0;
                ['monthly','tuition','admission','exam','other','lateFine','dueDate'].forEach(id => document.getElementById(id).value = '');
            }
            document.getElementById('cashPaid').value = '';
            applyMonthColor();
            calcTotal();
            document.getElementById('quickGR').value = '';
        };

        function getCurrentRecord() {
            const gr = document.getElementById('gr').value.trim();
            if (!gr) {
                alert('Please load a student first');
                return null;
            }
            return {
                id: Date.now(),
                gr: gr,
                name: document.getElementById('name').value,
                father: document.getElementById('fname').value,
                class: document.getElementById('class').value,
                month: document.getElementById('monthSel').value,
                dueDate: document.getElementById('dueDate').value || 'Not specified',
                monthly: parseFloat(document.getElementById('monthly').value) || 0,
                tuition: parseFloat(document.getElementById('tuition').value) || 0,
                admission: parseFloat(document.getElementById('admission').value) || 0,
                exam: parseFloat(document.getElementById('exam').value) || 0,
                other: parseFloat(document.getElementById('other').value) || 0,
                lateFine: parseFloat(document.getElementById('lateFine').value) || 0,
                arrears: parseFloat(document.getElementById('arrears').value) || 0,
                total: parseFloat(document.getElementById('totalPayable').value) || 0,
                paid: parseFloat(document.getElementById('cashPaid').value) || 0,
                timestamp: new Date().toLocaleString(),
            };
        }

        // ---------- CORRECTED PRINT VOUCHER with full details ----------
        function printVoucher(record) {
            // ensure dueFee is set
            const dueFee = record.total - record.paid;
            const monthClass = monthColors[record.month] || '';

            // build fee rows dynamically, only non-zero
            let feeRows = '';
            if (record.monthly > 0) feeRows += `<tr><td>Monthly Fee</td><td>Rs. ${record.monthly.toFixed(2)}</td></tr>`;
            if (record.tuition > 0) feeRows += `<tr><td>Tuition Fee</td><td>Rs. ${record.tuition.toFixed(2)}</td></tr>`;
            if (record.admission > 0) feeRows += `<tr><td>Admission Fee</td><td>Rs. ${record.admission.toFixed(2)}</td></tr>`;
            if (record.exam > 0) feeRows += `<tr><td>Exam Fee</td><td>Rs. ${record.exam.toFixed(2)}</td></tr>`;
            if (record.other > 0) feeRows += `<tr><td>Other Dues</td><td>Rs. ${record.other.toFixed(2)}</td></tr>`;
            if (record.lateFine > 0) feeRows += `<tr><td>Late Fine</td><td>Rs. ${record.lateFine.toFixed(2)}</td></tr>`;
            if (record.arrears > 0) feeRows += `<tr><td>Previous Arrears</td><td>Rs. ${record.arrears.toFixed(2)}</td></tr>`;
            if (feeRows === '') feeRows = '<tr><td colspan="2" style="text-align:center;">No fee components</td></tr>';

            // professional print style – two copies side by side
            const style = `
                @page { size: A4 landscape; margin: 1cm; }
                body { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
                .slip-container { display: flex; gap: 20px; width: 100%; max-width: 1200px; }
                .fee-slip { flex: 1; border: 2px solid #0b2b40; border-radius: 16px; padding: 20px; background: white; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
                .slip-header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #0b2b40; padding-bottom: 10px; }
                .slip-header h2 { font-size: 22px; color: #0b2b40; margin: 0; font-weight: 800; }
                .school-address { font-size: 11px; color: #2c3e50; margin: 4px 0; }
                .copy-type { font-size: 14px; font-weight: 700; background: #e3f0fa; display: inline-block; padding: 4px 20px; border-radius: 40px; margin: 8px 0 4px; color: #0b2b40; }
                .month-badge { display: inline-block; padding: 6px 18px; border-radius: 40px; font-weight: 700; font-size: 12px; margin-top: 5px; }
                .student-details { background: #f8fafd; padding: 16px; border-radius: 14px; margin: 15px 0; border-left: 5px solid #0b2b40; }
                .student-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
                .student-name { font-size: 18px; font-weight: 800; color: #0b2b40; }
                .student-father { font-size: 16px; font-weight: 600; }
                .label { color: #2c3e50; font-weight: 600; }
                .fees-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 13px; }
                .fees-table th { background: #0b2b40; color: white; padding: 10px; text-align: left; }
                .fees-table td { padding: 8px 12px; border: 1px solid #cbd5e1; }
                .total-row { background: #e3f0fa; font-weight: 700; }
                .due-row { background: #ffebee; font-weight: 700; color: #b33939; }
                .footer-section { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 15px; border-top: 1px dashed #9bb7d4; }
                .signature-box { text-align: center; width: 120px; }
                .signature-line { border-top: 1px solid #0b2b40; margin-top: 6px; padding-top: 4px; font-size: 10px; color: #4a627a; }
                .due-date-box { background: #fff3cd; padding: 4px 12px; border-radius: 40px; font-weight: 600; font-size: 12px; display: inline-block; }
                .month-jan { background: #c5e0ff; } .month-feb { background: #ffd7b3; } .month-mar { background: #c1ffc1; }
                .month-apr { background: #ffffb0; } .month-may { background: #ffb3b3; } .month-jun { background: #d5a6ff; }
                .month-jul { background: #a6e3ff; } .month-aug { background: #ffd966; } .month-sep { background: #b7e1cd; }
                .month-oct { background: #f4cccc; } .month-nov { background: #e0d3ff; } .month-dec { background: #d9d9d9; }
            `;

            function createSlip(copyType) {
                return `
                    <div class="fee-slip">
                        <div class="slip-header">
                            <h2>SIRAJ ELEMENTARY PUBLIC SCHOOL</h2>
                            <div class="school-address">Rohri, Sindh · Phone: (071) 123-4567</div>
                            <div class="copy-type">${copyType}</div>
                            <span class="month-badge ${monthClass}">${record.month} ${new Date().getFullYear()}</span>
                        </div>
                        <div class="student-details">
                            <div class="student-row">
                                <span class="student-name">${record.name}</span>
                                <span class="label">GR: ${record.gr}</span>
                            </div>
                            <div class="student-row">
                                <span class="student-father">S/o: ${record.father}</span>
                                <span class="label">Class: ${record.class}</span>
                            </div>
                            <div class="student-row" style="margin-top: 8px;">
                                <span class="due-date-box">📅 Due Date: ${record.dueDate}</span>
                            </div>
                        </div>
                        <table class="fees-table">
                            <thead><tr><th>Description</th><th>Amount (Rs.)</th></tr></thead>
                            <tbody>
                                ${feeRows}
                                <tr class="total-row"><td><strong>TOTAL PAYABLE</strong></td><td><strong>Rs. ${record.total.toFixed(2)}</strong></td></tr>
                                <tr><td>Cash Paid</td><td>Rs. ${record.paid.toFixed(2)}</td></tr>
                                <tr class="due-row"><td><strong>DUE FEE / BALANCE</strong></td><td><strong>Rs. ${dueFee.toFixed(2)}</strong></td></tr>
                            </tbody>
                        </table>
                        <div class="footer-section">
                            <div class="signature-box">
                                <div>Cashier</div>
                                <div class="signature-line">Signature</div>
                            </div>
                            <div class="signature-box">
                                <div>Principal</div>
                                <div class="signature-line">Signature</div>
                            </div>
                            <div class="signature-box">
                                <div>Date</div>
                                <div class="signature-line">${new Date().toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            const html = `
                <html>
                <head><style>${style}</style></head>
                <body>
                    <div class="slip-container">
                        ${createSlip('STUDENT COPY')}
                        ${createSlip('SCHOOL COPY')}
                    </div>
                </body>
                </html>
            `;

            const iframe = document.getElementById('printFrame');
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(html);
            iframe.contentWindow.document.close();
            setTimeout(() => { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 400);
        }

        window.printCurrentVoucher = function() {
            const rec = getCurrentRecord();
            if (!rec) return;
            printVoucher(rec);
        };

        window.saveOnly = function() {
            const rec = getCurrentRecord();
            if (!rec) return;
            rec.dueFee = rec.total - rec.paid;
            transactions.unshift(rec);
            if (transactions.length > 100) transactions.pop();
            localStorage.setItem('siraj_transactions', JSON.stringify(transactions));
            window.transactions = transactions;
            renderHistory();
            alert('Record saved successfully.');
        };

        window.saveAndPrintVoucher = function() {
            const rec = getCurrentRecord();
            if (!rec) return;
            rec.dueFee = rec.total - rec.paid;
            transactions.unshift(rec);
            if (transactions.length > 100) transactions.pop();
            localStorage.setItem('siraj_transactions', JSON.stringify(transactions));
            window.transactions = transactions;
            renderHistory();
            printVoucher(rec);
        };

        // ----- history functions (same as before, but ensure print uses corrected one) -----
        window.renderHistory = function() {
            const tbody = document.getElementById('historyBody');
            let sorted = [...transactions].sort((a,b) => (monthOrder[b.month] - monthOrder[a.month]) || b.id - a.id);
            let last30 = sorted.slice(0, 30);
            let currentMonth = '';
            let html = '';
            last30.forEach(t => {
                const due = t.total - t.paid;
                if (t.month !== currentMonth) {
                    currentMonth = t.month;
                    html += `<tr class="month-separator"><td colspan="9" style="text-align:center; font-weight:800;">📅 ${currentMonth} (${last30.filter(x=>x.month===currentMonth).length})</td></tr>`;
                }
                const monthClass = monthColors[t.month] || '';
                const monthOptions = Object.keys(monthColors).map(m => `<option value="${m}" ${m===t.month?'selected':''}>${m}</option>`).join('');
                const tStr = JSON.stringify(t).replace(/'/g, "&apos;");
                html += `<tr>
                    <td>${t.gr}</td><td>${t.name}</td><td>${t.father}</td>
                    <td><span class="month-badge ${monthClass}">${t.month}</span></td>
                    <td>${t.dueDate}</td><td>Rs.${t.total}</td><td>Rs.${t.paid}</td>
                    <td style="color:${due>0?'#b33939':'#0b8040'}">Rs.${due}</td>
                    <td class="action-btns">
                        <select onchange="generateMonthVoucher('${tStr.replace(/"/g, '&quot;')}', this.value)">${monthOptions}</select>
                        <button class="print2-btn" onclick='printFromHistory(${JSON.stringify(t).replace(/'/g, "&apos;")})'>🖨️</button>
                        <button class="edit-btn" onclick='editRecord(${JSON.stringify(t).replace(/'/g, "&apos;")})'>✎</button>
                        <button class="delete-btn" onclick='deleteRecord(${t.id})'>✕</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('totalRecords').innerText = transactions.length;
        };

        window.printFromHistory = function(rec) {
            printVoucher(rec);
        };

        window.editRecord = function(rec) {
            document.getElementById('gr').value = rec.gr;
            document.getElementById('name').value = rec.name;
            document.getElementById('fname').value = rec.father;
            document.getElementById('class').value = rec.class;
            document.getElementById('monthly').value = rec.monthly;
            document.getElementById('tuition').value = rec.tuition;
            document.getElementById('admission').value = rec.admission;
            document.getElementById('exam').value = rec.exam;
            document.getElementById('other').value = rec.other;
            document.getElementById('lateFine').value = rec.lateFine;
            document.getElementById('arrears').value = rec.arrears;
            document.getElementById('monthSel').value = rec.month;
            document.getElementById('dueDate').value = rec.dueDate;
            document.getElementById('cashPaid').value = rec.paid;
            applyMonthColor();
            calcTotal();
        };

        window.generateMonthVoucher = function(recStr, newMonth) {
            let rec = JSON.parse(recStr);
            let newRec = { ...rec, id: Date.now(), month: newMonth, paid: 0 };
            newRec.arrears = (rec.total - rec.paid) > 0 ? (rec.total - rec.paid) : 0;
            newRec.total = newRec.monthly + newRec.tuition + newRec.admission + newRec.exam + newRec.other + newRec.lateFine + newRec.arrears;
            newRec.dueFee = newRec.total;
            transactions.unshift(newRec);
            if (transactions.length > 100) transactions.pop();
            localStorage.setItem('siraj_transactions', JSON.stringify(transactions));
            window.transactions = transactions;
            renderHistory();
            alert(`Voucher for ${newMonth} generated.`);
        };

        window.deleteRecord = function(id) {
            if (confirm('Delete this record?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('siraj_transactions', JSON.stringify(transactions));
                window.transactions = transactions;
                renderHistory();
            }
        };

        window.exportMonthlyReport = function() {
            const month = document.getElementById('monthSel').value;
            const data = transactions.filter(t => t.month === month);
            alert(`Monthly report for ${month}: ${data.length} records (see console)`);
            console.log(data);
        };

        window.importDatabase = function(ev) {
            alert('Excel import demo – using sample data.');
        };

        window.clearForm = function() {
            ['gr','name','fname','class','monthly','tuition','admission','exam','other','lateFine','arrears','cashPaid','dueDate'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            calcTotal();
        };

        // initialise
        applyMonthColor();
        calcTotal();
        renderHistory();

        setInterval(() => {
            const d = new Date().toLocaleString('en-PK',{hour12:false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('liveClockNav').innerText = d;
        }, 1000);
    })();
</script>
</body>
</html>
