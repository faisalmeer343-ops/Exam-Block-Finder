<!DOCTYPE html>
<html lang="sd">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>اشوڪ ڪمار زرعي فارم · گھڻ فصل</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Arabic', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #1b5e20;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 8px 5px;
            direction: rtl;
        }
        .app-container {
            max-width: 520px;
            width: 100%;
            background: #f9fbe7;
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 12px 30px rgba(0, 40, 0, 0.6);
            overflow: hidden;
            border: 2px solid #ffb300;
        }
        .farm-header {
            background: #2e7d32;
            color: #fff9c4;
            padding: 14px 12px 10px 12px;
            text-align: center;
            border-bottom: 4px solid #ff8f00;
        }
        .farm-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 2px 2px 0 #1b5e20;
        }
        .farm-header h2 {
            font-size: 1rem;
            font-weight: 400;
            background: #f57f17;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
            color: #ffffe0;
        }
        .crop-manager {
            background: #fff3e0;
            padding: 12px 12px 8px 12px;
            border-bottom: 2px solid #c0a86a;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .crop-selector {
            flex: 2;
            min-width: 150px;
        }
        .crop-selector select {
            width: 100%;
            padding: 10px 8px;
            border-radius: 40px;
            border: 2px solid #6b8e4c;
            background: #fefef0;
            font-weight: 600;
            font-size: 1rem;
        }
        .crop-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .crop-btn {
            background: #558b2f;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #33691e;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #aed581;
        }
        .crop-btn:active { transform: translateY(3px); box-shadow: none; }
        .crop-btn-danger { background: #b71c1c; box-shadow: 0 3px 0 #8b0000; }
        .content {
            padding: 14px 12px 20px 12px;
        }
        .section-title {
            background: #ffb300;
            color: #1f2a0e;
            padding: 6px 15px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 18px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 6px solid #2e7d32;
        }
        .card {
            background: #ffffffd9;
            backdrop-filter: blur(2px);
            border-radius: 18px;
            padding: 14px 12px;
            box-shadow: 0 4px 10px rgba(0, 30, 0, 0.2);
            border: 1px solid #a5d6a7;
            margin-bottom: 10px;
        }
        .field-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .field-group label {
            font-weight: 600;
            color: #1f3a1f;
            font-size: 0.9rem;
            margin-bottom: 3px;
            padding-right: 6px;
        }
        .field-group input, .field-group select {
            background: #fefef0;
            border: 2px solid #8bc34a;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
        }
        .field-group input:focus {
            border-color: #ff9800;
            background: #fffae6;
        }
        .field-group input[type="number"] { text-align: left; direction: ltr; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .calculation-panel {
            background: #c8e6c9;
            border-radius: 24px;
            padding: 16px 12px;
            margin: 20px 0 10px 0;
            border: 2px solid #2e7d32;
        }
        .calc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed #558b2f;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .calc-item .value {
            background: #f9f9e0;
            padding: 4px 16px;
            border-radius: 40px;
            color: #003300;
            font-weight: 700;
            direction: ltr;
        }
        .highlight-value { background: #ffb300 !important; color: #000 !important; }
        .readonly-fake {
            background: #e0e0c0;
            border: 2px solid #9e9e6b;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 700;
            color: #003300;
            direction: ltr;
            text-align: left;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin: 25px 0 8px 0;
            flex-wrap: wrap;
        }
        .btn {
            background: #2e7d32;
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            flex: 1 1 auto;
            box-shadow: 0 4px 0 #1b5e20;
            cursor: pointer;
            text-align: center;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-warning { background: #bf360c; box-shadow: 0 4px 0 #872301; }
        .footer-note { text-align: center; color: #375e37; font-size: 0.75rem; margin-top: 16px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="farm-header">
        <h1>🌾 اشوڪ ڪمار زرعي فارم</h1>
        <h2>ھنڱورنو · گھڻ-فصل نظام</h2>
    </div>

    <!-- فصل مئنيجر بار -->
    <div class="crop-manager">
        <div class="crop-selector">
            <select id="cropSelector"></select>
        </div>
        <div class="crop-actions">
            <button class="crop-btn" id="newCropBtn">➕ نئون فصل</button>
            <button class="crop-btn crop-btn-danger" id="deleteCropBtn">🗑️ ختم</button>
        </div>
    </div>

    <div class="content">
        <!-- ھاري جي معلومات (مشترڪہ سڀني فصلن ۾؟ ھتي فيصلو: ھر فصل سان ڳنڍيل) -->
        <div class="card">
            <div class="section-title">🧑‍🌾 ھاري  (ھن فصل لاءِ)</div>
            <div class="field-group">
                <label>ھاري جو نالو</label>
                <input type="text" id="farmerName" placeholder="مثال: محمد بخش">
            </div>
            <div class="row-2">
                <div class="field-group"><label>شناختي ڪارڊ</label><input type="text" id="farmerCnic"></div>
                <div class="field-group"><label>موبائل</label><input type="tel" id="farmerMobile"></div>
            </div>
            <div class="field-group"><label>ايڊريس</label><input type="text" id="farmerAddress"></div>
        </div>

        <!-- فصل ۽ آمدني -->
        <div class="card">
            <div class="section-title">🌱 فصل ۽ آمدني</div>
            <div class="row-2">
                <div class="field-group"><label>فصل جو نالو</label><input type="text" id="cropName"></div>
                <div class="field-group"><label>پوکڻ جو مھينو</label><input type="text" id="plantingMonth"></div>
            </div>
            <div class="row-2">
                <div class="field-group"><label>ايڪڙ</label><input type="number" id="acres" step="0.1" value="0"></div>
                <div class="field-group"><label>تاريخ</label><input type="date" id="cropDate"></div>
            </div>
            <div class="field-group"><label>فصل مان کنيل رقم (آمدني)</label><input type="number" id="revenue" step="1" value="0"></div>
            <div class="row-2">
                <div class="field-group"><label>ھاري جي کنيل رقم</label><input type="number" id="farmerTaken" step="1" value="0"></div>
                <div class="field-group"><label>ايڊوانس رقم</label><input type="number" id="advance" step="1" value="0"></div>
            </div>
        </div>

        <!-- خرچن جا تفصيل -->
        <div class="card">
            <div class="section-title">💰 فصل تي خرچ (مشترڪ)</div>
            <div class="row-2">
                <div class="field-group"><label>کيڙي جو خرچ</label><input type="number" id="landPrepCost" value="0"></div>
                <div class="field-group"><label>کيڙي جي نوعيت</label><input type="text" id="landPrepType"></div>
            </div>
            <div class="row-2">
                <div class="field-group"><label>ٻج جو خرچ</label><input type="number" id="seedCost" value="0"></div>
                <div class="field-group"><label>ٻج جو نالو</label><input type="text" id="seedName"></div>
            </div>
            <div class="row-2">
                <div class="field-group"><label>ڀاڻ جو خرچ</label><input type="number" id="fertilizerCost" value="0"></div>
                <div class="field-group"><label>ڀاڻ جو نالو</label><input type="text" id="fertilizerName"></div>
            </div>
            <div class="row-2">
                <div class="field-group"><label>دوا جو خرچ</label><input type="number" id="pesticideCost" value="0"></div>
                <div class="field-group"><label>دوا جو نالو</label><input type="text" id="pesticideName"></div>
            </div>
            <div class="row-3">
                <div class="field-group"><label>لڻائي</label><input type="number" id="harvestingCost" value="0"></div>
                <div class="field-group"><label>مزدوري</label><input type="number" id="laborCost" value="0"></div>
                <div class="field-group"><label>ڪرايو</label><input type="number" id="rentCost" value="0"></div>
            </div>
        </div>

        <!-- زميندار -->
        <div class="card">
            <div class="section-title">👨‍🌾 زميندار</div>
            <div class="row-2">
                <div class="field-group"><label>زميندار جو خرچ</label><input type="number" id="landownerExpense" value="0"></div>
                <div class="field-group"><label>بقايا (خودڪار)</label><div class="readonly-fake" id="landownerRemainingDisplay">0</div></div>
            </div>
        </div>

        <!-- حساب پينل -->
        <div class="calculation-panel">
            <div class="calc-item"><span>💰 ڪل خرچ</span><span class="value" id="totalExpensesDisplay">0</span></div>
            <div class="calc-item"><span>📈 خالص منافع</span><span class="value" id="netProfitDisplay">0</span></div>
            <div class="calc-item"><span>👨‍🌾 ھاري جو اڌ</span><span class="value" id="farmerShareDisplay">0</span></div>
            <div class="calc-item"><span>🧑‍🌾 زميندار جو اڌ</span><span class="value" id="landownerShareDisplay">0</span></div>
            <div class="calc-item"><span>🔄 ھاري جي بقايا</span><span class="value highlight-value" id="farmerBalanceDisplay">0</span></div>
            <div class="calc-item"><span>🏦 زميندار جي بقايا</span><span class="value highlight-value" id="landownerBalanceDisplay">0</span></div>
        </div>

        <div class="btn-row">
            <button class="btn" id="saveCurrentBtn">💾 ھاڻي محفوظ ڪريو</button>
            <button class="btn btn-warning" id="clearAllBtn">🗑️ سڀ فصل ختم</button>
        </div>
        <div class="footer-note">
            * ھر فصل الڳ محفوظ ٿئي ٿو. مٿي ڊراپ ڊائون مان فصل چونڊيو.
        </div>
    </div>
</div>

<script>
(function() {
    // === سڀ فيلڊ ID ===
    const fieldIds = [
        'farmerName','farmerCnic','farmerMobile','farmerAddress',
        'cropName','plantingMonth','acres','cropDate',
        'revenue','farmerTaken','advance',
        'landPrepCost','landPrepType','seedCost','seedName',
        'fertilizerCost','fertilizerName','pesticideCost','pesticideName',
        'harvestingCost','laborCost','rentCost',
        'landownerExpense'
    ];

    // ڊسپلي عنصر
    const totalExpensesSpan = document.getElementById('totalExpensesDisplay');
    const netProfitSpan = document.getElementById('netProfitDisplay');
    const farmerShareSpan = document.getElementById('farmerShareDisplay');
    const landownerShareSpan = document.getElementById('landownerShareDisplay');
    const farmerBalanceSpan = document.getElementById('farmerBalanceDisplay');
    const landownerBalanceSpan = document.getElementById('landownerBalanceDisplay');
    const landownerRemainingDiv = document.getElementById('landownerRemainingDisplay');

    // فصل مئنيجر عنصر
    const cropSelector = document.getElementById('cropSelector');
    const newCropBtn = document.getElementById('newCropBtn');
    const deleteCropBtn = document.getElementById('deleteCropBtn');
    const saveCurrentBtn = document.getElementById('saveCurrentBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // لوڪل اسٽوريج جي ڪنجي
    const STORAGE_KEY = 'ashokMultiCrop';

    // موجوده فصل جي ID (منفرد)
    let currentCropId = null;

    // === مددگار فنڪشن ===
    function getInputAsNumber(id) {
        const el = document.getElementById(id);
        if (!el) return 0;
        const val = parseFloat(el.value);
        return isNaN(val) ? 0 : val;
    }

    // حساب اپڊيٽ
    function updateCalculations() {
        const landPrep = getInputAsNumber('landPrepCost');
        const seed = getInputAsNumber('seedCost');
        const fertilizer = getInputAsNumber('fertilizerCost');
        const pesticide = getInputAsNumber('pesticideCost');
        const harvest = getInputAsNumber('harvestingCost');
        const labor = getInputAsNumber('laborCost');
        const rent = getInputAsNumber('rentCost');
        const landownerExtra = getInputAsNumber('landownerExpense');

        const totalCropExpenses = landPrep + seed + fertilizer + pesticide + harvest + labor + rent;
        const totalExpenses = totalCropExpenses + landownerExtra;

        const revenue = getInputAsNumber('revenue');
        const netProfit = revenue - totalExpenses;
        const halfProfit = netProfit / 2;

        const farmerTaken = getInputAsNumber('farmerTaken');
        const advance = getInputAsNumber('advance');
        const totalFarmerDrawn = farmerTaken + advance;

        const farmerBalance = halfProfit - totalFarmerDrawn;
        const landownerBalance = halfProfit;

        // اپڊيٽ ڊسپلي
        totalExpensesSpan.innerText = Math.round(totalExpenses);
        netProfitSpan.innerText = Math.round(netProfit);
        farmerShareSpan.innerText = Math.round(halfProfit);
        landownerShareSpan.innerText = Math.round(halfProfit);
        farmerBalanceSpan.innerText = Math.round(farmerBalance);
        landownerBalanceSpan.innerText = Math.round(landownerBalance);
        landownerRemainingDiv.innerText = Math.round(landownerBalance);

        // رنگ تبديل
        farmerBalanceSpan.style.background = farmerBalance < 0 ? '#ffab91' : '#ffb300';
        landownerBalanceSpan.style.background = landownerBalance < 0 ? '#ffab91' : '#ffb300';
        landownerRemainingDiv.style.background = landownerBalance < 0 ? '#ffab91' : '#f9f9e0';
    }

    // سڀ فيلڊ مان ڊيٽا ڪڍي هڪ آبجيڪٽ ۾
    function gatherFormData() {
        const data = {};
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) data[id] = el.value;
        });
        return data;
    }

    // ڊيٽا کي فارم ۾ لوڊ ڪريو
    function populateForm(data) {
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el && data.hasOwnProperty(id)) {
                el.value = data[id];
            }
        });
        updateCalculations();
    }

    // سڀ فيلڊ ڊفالٽ تي سيٽ ڪريو (نئين فصل لاءِ)
    function clearForm() {
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            if (el.type === 'number') el.value = '0';
            else if (el.type === 'date') {
                const today = new Date().toISOString().split('T')[0];
                el.value = today;
            } else el.value = '';
        });
        updateCalculations();
    }

    // === لوڪل اسٽوريج آپريشن ===
    function loadAllCrops() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                return JSON.parse(stored) || {};
            } catch { return {}; }
        }
        return {};
    }

    function saveAllCrops(crops) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(crops));
    }

    // ڊراپ ڊائون ريفريش ڪريو
    function refreshCropDropdown(crops, selectedId = null) {
        const selector = cropSelector;
        selector.innerHTML = '';
        const cropIds = Object.keys(crops);
        if (cropIds.length === 0) {
            const option = document.createElement('option');
            option.textContent = '-- ڪو فصل ناهي --';
            option.value = '';
            selector.appendChild(option);
            currentCropId = null;
            return;
        }

        cropIds.forEach(id => {
            const crop = crops[id];
            const label = crop?.cropName ? crop.cropName : id.slice(0, 8);
            const date = crop?.cropDate ? ` (${crop.cropDate})` : '';
            const display = ${label}${date};
            const option = document.createElement('option');
            option.value = id;
            option.textContent = display.length > 25 ? display.slice(0,22)+'...' : display;
            selector.appendChild(option);
        });

        if (selectedId && crops[selectedId]) {
            selector.value = selectedId;
            currentCropId = selectedId;
        } else {
            // پھريون ڊفالٽ
            selector.value = cropIds[0];
            currentCropId = cropIds[0];
        }
    }

    // موجودہ فصل کي لوڊ ڪريو (currentCropId مطابق)
    function loadCurrentCrop() {
        if (!currentCropId) {
            clearForm();
            return;
        }
        const crops = loadAllCrops();
        const cropData = crops[currentCropId];
        if (cropData) {
            populateForm(cropData);
        } else {
            clearForm();
        }
    }

    // موجوده فصل کي محفوظ ڪريو (currentCropId سان)
    function saveCurrentCrop() {
        if (!currentCropId) {
            // جيڪڏهن ڪو فصل ناهي ته نئون ٺاهيو
            createNewCropAndSwitch(true);
            return;
        }
        const crops = loadAllCrops();
        crops[currentCropId] = gatherFormData();
        saveAllCrops(crops);
        refreshCropDropdown(crops, currentCropId);
    }

    // نئون فصل ٺاهيو ۽ ان تي سوئچ ڪريو
    function createNewCropAndSwitch(savePrevious = false) {
        const crops = loadAllCrops();
        // منفرد ID ٺاهيو
        const newId = 'crop_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        // جيڪڏهن سيو ڪرڻ چاهيون ٿا اڳوڻي کي
        if (savePrevious && currentCropId && crops[currentCropId]) {
            crops[currentCropId] = gatherFormData();
        }
        // نئين فصل لاءِ خالي ڊيٽا
        const emptyData = {};
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if (el.type === 'number') emptyData[id] = '0';
                else if (el.type === 'date') {
                    emptyData[id] = new Date().toISOString().split('T')[0];
                } else emptyData[id] = '';
            }
        });
        crops[newId] = emptyData;
        saveAllCrops(crops);
        refreshCropDropdown(crops, newId);
        loadCurrentCrop(); // populate form
    }

    // فصل ڊليٽ ڪريو
    function deleteCurrentCrop() {
        if (!currentCropId) return;
        if (!confirm('پڪ سان ھي فصل ميسار ڪريو؟')) return;
        const crops = loadAllCrops();
        delete crops[currentCropId];
        saveAllCrops(crops);
        const ids = Object.keys(crops);
        if (ids.length > 0) {
            refreshCropDropdown(crops, ids[0]);
        } else {
            refreshCropDropdown(crops, null);
            clearForm();
        }
        loadCurrentCrop();
    }

    // سڀ فصل ختم
    function deleteAllCrops() {
        if (!confirm('سڀ فصل ختم ڪري ڇڏيون؟ هي عمل واپس نٿو ٿي سگھي۔')) return;
        localStorage.removeItem(STORAGE_KEY);
        refreshCropDropdown({}, null);
        clearForm();
    }

    // === ايونٽ ھينڊلر ===
    function attachFieldListeners() {
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', function() {
                    updateCalculations();
                });
                el.addEventListener('change', function() {
                    updateCalculations();
                });
            }
        });
    }

    // فصل مٽائڻ تي
    cropSelector.addEventListener('change', function(e) {
        const newId = e.target.value;
        if (!newId) return;
        // موجوده کي خودڪار سيو ڪريو (آپشنل)
        const crops = loadAllCrops();
        if (currentCropId && crops[currentCropId]) {
            crops[currentCropId] = gatherFormData();
            saveAllCrops(crops);
        }
        currentCropId = newId;
        loadCurrentCrop();
    });

    // بٽڻ
    newCropBtn.addEventListener('click', function() {
        createNewCropAndSwitch(true); // اڳوڻو محفوظ ڪري نئون کوليو
    });

    deleteCropBtn.addEventListener('click', deleteCurrentCrop);

    saveCurrentBtn.addEventListener('click', function() {
        saveCurrentCrop();
        alert('موجوده فصل محفوظ ٿي ويو');
    });

    clearAllBtn.addEventListener('click', deleteAllCrops);

    // شروعاتي لوڊ
    function initialize() {
        const crops = loadAllCrops();
        const ids = Object.keys(crops);
        if (ids.length > 0) {
            refreshCropDropdown(crops, ids[0]);
            loadCurrentCrop();
        } else {
            // ڪو فصل ناهي، هڪ خالي فصل ٺاهيو
            createNewCropAndSwitch(false);
        }
        attachFieldListeners();
        updateCalculations();
    }

    initialize();
